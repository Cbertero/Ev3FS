server:
  port: 8080

spring:
  application:
    name: ms-puerta-enlace

  cloud:
    gateway:
      routes:

        # ========================================================
        # MS: GESTIÓN DE PERSONAL — LOGIN (sin token, es como se obtiene)
        # ========================================================
        - id: ms-gestion-personal-login
          uri: http://ms-gestion-personal:8082
          predicates:
            - Path=/api/personal/login,/api/personal/registrar
          # Sin JwtAuthenticationFilter: login y registro no requieren token todavía

        - id: ms-gestion-personal
          uri: http://ms-gestion-personal:8082
          predicates:
            - Path=/api/personal/**
          filters:
            - JwtAuthenticationFilter

        # ========================================================
        # MS: GESTIÓN DE HUÉSPEDES (Claudio Bertero)
        # ========================================================
        - id: ms-gestion-huespedes
          uri: http://ms-gestion-huespedes:8083
          predicates:
            - Path=/api/huespedes/**
          filters:
            - JwtAuthenticationFilter

        # ========================================================
        # MS: GESTIÓN DE HABITACIONES (Claudio Bertero)
        # ========================================================
        - id: ms-gestion-habitaciones
          uri: http://ms-gestion-habitaciones:8084
          predicates:
            - Path=/api/habitaciones/**
          filters:
            - JwtAuthenticationFilter

        # ========================================================
        # MS: GESTIÓN DE RESERVAS (Claudio Bertero)
        # ========================================================
        - id: ms-gestion-reservas
          uri: http://ms-gestion-reservas:8085
          predicates:
            - Path=/api/reservas/**
          filters:
            - JwtAuthenticationFilter

        # ========================================================
        # MS: GESTIÓN DE AUDITORÍA (Logs / Historial)
        # NOTA: la ruta debe coincidir con @RequestMapping("/api/auditoria")
        # del controlador real (AuditoriaController), no con "/api/log-auditoria"
        # ========================================================
        - id: ms-log-auditoria
          uri: http://ms-log-auditoria:8086
          predicates:
            - Path=/api/auditoria/**
          filters:
            - JwtAuthenticationFilter

        # ===================================================================
        # MS: GESTIÓN DE NOTIFICACIONES (Alertas / Correos) (Carlos Lobos)
        # ===================================================================
        - id: ms-gestion-notificaciones
          uri: http://ms-logs-notificaciones:8087
          predicates:
            - Path=/api/notificaciones/**
          filters:
            - JwtAuthenticationFilter

        # ========================================================
        # MS: RECEPCIONISTA (Orquestador) - NUEVO
        # ========================================================
        - id: ms-recepcionista
          uri: http://ms-recepcionista:8088
          predicates:
            - Path=/api/recepcion/**
          filters:
            - JwtAuthenticationFilter

        # ========================================================
        # DOCS: Swagger / OpenAPI de cada microservicio
        # Estas rutas exponen el /v3/api-docs de cada MS a través
        # del gateway, sin pasar por JwtAuthenticationFilter, para
        # que Swagger UI del gateway pueda consultarlas libremente.
        # ========================================================
        - id: personal-docs
          uri: http://ms-gestion-personal:8082
          predicates:
            - Path=/personal-docs/v3/api-docs
          filters:
            - RewritePath=/personal-docs/v3/api-docs, /v3/api-docs

        - id: huespedes-docs
          uri: http://ms-gestion-huespedes:8083
          predicates:
            - Path=/huespedes-docs/v3/api-docs
          filters:
            - RewritePath=/huespedes-docs/v3/api-docs, /v3/api-docs

        - id: habitaciones-docs
          uri: http://ms-gestion-habitaciones:8084
          predicates:
            - Path=/habitaciones-docs/v3/api-docs
          filters:
            - RewritePath=/habitaciones-docs/v3/api-docs, /v3/api-docs

        - id: reservas-docs
          uri: http://ms-gestion-reservas:8085
          predicates:
            - Path=/reservas-docs/v3/api-docs
          filters:
            - RewritePath=/reservas-docs/v3/api-docs, /v3/api-docs

        - id: auditoria-docs
          uri: http://ms-log-auditoria:8086
          predicates:
            - Path=/auditoria-docs/v3/api-docs
          filters:
            - RewritePath=/auditoria-docs/v3/api-docs, /v3/api-docs

        - id: notificaciones-docs
          uri: http://ms-logs-notificaciones:8087
          predicates:
            - Path=/notificaciones-docs/v3/api-docs
          filters:
            - RewritePath=/notificaciones-docs/v3/api-docs, /v3/api-docs

        - id: recepcionista-docs
          uri: http://ms-recepcionista:8088
          predicates:
            - Path=/recepcionista-docs/v3/api-docs
          filters:
            - RewritePath=/recepcionista-docs/v3/api-docs, /v3/api-docs

# ========================================================
# SWAGGER UI: dropdown para elegir entre microservicios
# Acceso: http://localhost:8080/swagger-ui/index.html
# ========================================================
springdoc:
  swagger-ui:
    urls:
      - name: Personal
        url: /personal-docs/v3/api-docs
      - name: Huéspedes
        url: /huespedes-docs/v3/api-docs
      - name: Habitaciones
        url: /habitaciones-docs/v3/api-docs
      - name: Reservas
        url: /reservas-docs/v3/api-docs
      - name: Auditoría
        url: /auditoria-docs/v3/api-docs
      - name: Notificaciones
        url: /notificaciones-docs/v3/api-docs
      - name: Recepcionista
        url: /recepcionista-docs/v3/api-docs