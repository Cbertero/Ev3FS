server.port=8085
spring.application.name=ms-gestion-reservas

# MySQL DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/db_reservas
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# URLs de los otros microservicios
hotel.ms.huespedes.url=http://localhost:8083
hotel.ms.habitaciones.url=http://localhost:8084
