server:
  port: 8085

spring:
  application:
    name: ms-gestion-reservas

  # MySQL DataSource
  datasource:
    url: jdbc:mysql://localhost:3306/Hotel_CL_CB?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password:

  # JPA / Hibernate
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# URLs de los otros microservicios (Comunicación interna Este-Oeste)
hotel:
  ms:
    huespedes:
      url: http://localhost:8083
    habitaciones:
      url: http://localhost:8084