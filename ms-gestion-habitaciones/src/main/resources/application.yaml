server:
  port: 8084

spring:
  application:
    name: ms-gestion-habitaciones
  datasource:
    url: jdbc:mysql://hotel-mysql:3306/Hotel_CL_CB?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ""  # Si tienes clave en tu Mac, ponla aquí adentro
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true